function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function startSecurityGame(){
  const bad = shuffleArray(SECURITY_ITEMS.filter(x=>x.bad)).slice(0, Math.random()<.5?2:3);
  const safe = shuffleArray(SECURITY_ITEMS.filter(x=>!x.bad)).slice(0, 6);
  state.securityGameItems = shuffleArray([...bad,...safe]);
  state.securitySelected = [];
  state.securityAttempts = 0;
  state.securityDone = false;
}
function toggleSecurityItem(id){
  if(!state.securitySelected) state.securitySelected=[];
  if(state.securitySelected.includes(id)){
    state.securitySelected = state.securitySelected.filter(x=>x!==id);
  }else{
    state.securitySelected.push(id);
  }
  playTone(640,.07);
  render();
}
function checkSecurityAnswers(){
  const badIds = state.securityGameItems.filter(x=>x.bad).map(x=>x.id).sort().join(',');
  const selectedIds = [...state.securitySelected].sort().join(',');
  state.securityAttempts = (state.securityAttempts||0)+1;
  if(badIds===selectedIds){
    state.securityDone = true;
    playTone(880,.12);
  }else{
    state.securityDone = false;
    playTone(260,.18);
  }
  render();
}

  {id:'carryon',name:'Carry-on Suitcase',emoji:'🧳',sub:'Perfect for short trips'},

  {id:'sports',name:'Sports Bag',emoji:'🎽',sub:'For active travelers'}
];

let state = {step:0,name:'',passport:'',passportCopy:'',airline:null,airportCode:null,airportCity:null,country:null,destAirport:null,checkPassport:'',checkedIn:false,bag:null,securityDone:false,securityItems:{passport:false,bag:false,water:false},securityGameItems:null,securitySelected:[],securityAttempts:0,depTime:null,arrTime:null,seat:null,seatClass:null,meal:null,selfieData:null};
let takenSeats = [];
let stream = null;
let soundOn = true;

function initTaken(){takenSeats=[];for(let r=1;r<=28;r++) for(let c of ['A','B','C','D','E','F']) if(Math.random()<.32) takenSeats.push(r+c);}
initTaken();

function randPassport(){
  const letters='ABCDEFGHJKLMNPQRSTUVWXYZ';
  const nums='23456789';
  let s='';
  for(let i=0;i<2;i++) s+=letters[Math.floor(Math.random()*letters.length)];
  s+='-';
  for(let i=0;i<4;i++) s+=nums[Math.floor(Math.random()*nums.length)];
  s+='-';
  for(let i=0;i<2;i++) s+=letters[Math.floor(Math.random()*letters.length)];
  return s;
}
function ensurePassport(){if(!state.passport) state.passport=randPassport();}

function renderSteps(){
  const bar=document.getElementById('steps-bar');
  bar.innerHTML=STEPS.map((s,i)=>`<div class="step-dot ${i<state.step?'done':i===state.step?'active':''}" title="${s}">${i<state.step?'✓':(i+1)}</div>`).join('');
  document.getElementById('progress-fill').style.width=((state.step+1)/STEPS.length*100)+'%';
}
function flyThen(n){
  playTone(550,0.08);
  const p=document.createElement('div');
  p.className='fly-plane';
  p.innerHTML='<img src="https://github.com/nelsonsia27/G5-BookAFlight/blob/main/G5-L6-2s%20(9).gif?raw=true" alt="Flying airplane transition">';
  document.body.appendChild(p);
  setTimeout(()=>{p.remove();state.step=n;renderSteps();render();},2600);
}
function go(n){flyThen(n);}
function render(){
  const el=document.getElementById('step-content');
  switch(state.step){
    case 0: el.innerHTML=renderPassport(); break;
    case 1: el.innerHTML=renderAirline(); break;
    case 2: el.innerHTML=renderAirport(); break;
    case 3: el.innerHTML=renderCountry(); break;
    case 4: el.innerHTML=renderCheckIn(); break;
    case 5: el.innerHTML=renderBaggage(); break;
    case 6: el.innerHTML=renderSecurity(); break;
    case 7: el.innerHTML=renderSchedule(); break;
    case 8: el.innerHTML=renderSeat(); break;
    case 9: el.innerHTML=renderMeal(); break;
    case 10: el.innerHTML=renderSelfie(); setupCamera(); break;
    case 11: el.innerHTML=renderTicket(); break;
    case 12: el.innerHTML=renderArrival(); makeConfetti(); break;
    case 13: el.innerHTML=renderCertificate(); makeConfetti(); break;
  }
}
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=.82; u.pitch=1.12; u.lang='en-US';
  speechSynthesis.speak(u);
}
function speakStep(){
  const messages=[
    'Type your name. Read your passport number. Copy it in the box.',
    'Choose your airline.',
    'Choose your departure airport.',
    'Choose your destination country.',
    'Airport check-in. Type your passport number again.',
    'Choose your baggage.',
    'Security check. Click the items to pass security.',
    'Choose your destination airport and departure time.',
    'Choose an available seat.',
    'Choose your in-flight meal.',
    'Take your passport selfie and smile.',
    'Read your boarding pass.',
    'Welcome to your destination.',
    'Congratulations. You are a junior traveler.'
  ];
  speak(messages[state.step]||'Let us travel.');
}
function toggleSound(){soundOn=!soundOn;document.getElementById('sound-label').textContent=soundOn?'On':'Off';}
function playTone(freq=440,dur=.1){
  if(!soundOn) return;
  try{
    const AC=window.AudioContext||window.webkitAudioContext; const ctx=new AC();
    const o=ctx.createOscillator(); const g=ctx.createGain();
    o.frequency.value=freq;o.type='sine';o.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(.05,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function showGifOverlay(src,title,nextStep){
  playTone(660,.12);
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="overlay-inner"><img src="${src}" alt="${title} animation"><h2>${title}</h2><p style="font-weight:800;color:#486178;margin:.5rem 0 1rem">Watch the full animation. Press Continue when you are ready.</p><button class="btn-primary" style="max-width:360px;margin:0 auto" onclick="this.closest('.overlay').remove();go(${nextStep})">Continue →</button></div>`;
  document.body.appendChild(ov);
}

  const ok = state.name.trim().length>0 && state.passportCopy.trim().toUpperCase()===state.passport;
  const btn = document.getElementById('passport-next-btn');
  const msg = document.getElementById('passport-ready-msg');
  if(btn) btn.disabled = !ok;
  if(msg) msg.innerHTML = ok ? '<span class="status-pill">✅ Passport ready!</span>' : '<span style="font-size:.82rem;color:#b56b00;font-weight:900">Copy the number to continue.</span>';
}
function updateCheckInReady(){
  const ok = state.checkPassport.trim().toUpperCase()===state.passport;
  const btn = document.getElementById('checkin-next-btn');
  const msg = document.getElementById('checkin-ready-msg');
  if(btn) btn.disabled = !ok;
  if(msg) msg.innerHTML = ok ? '<span class="status-pill">✅ Check-in complete!</span>' : '<span style="font-size:.82rem;color:#b56b00;font-weight:900">Copy the passport number shown above.</span>';
}
function copyPassportToCheckIn(){
  state.checkPassport = state.passport;
  const input = document.getElementById('check-passport-input');
  if(input) input.value = state.passport;
  updateCheckInReady();
}

  </div>
  <div class="grid-3">${state.securityGameItems.map(item=>`
    <div class="option-btn ${selected.includes(item.id)?'selected':''}" onclick="toggleSecurityItem('${item.id}')">

function renderSchedule(){

  const slots=[{dep:'06:00',label:'Early Morning'},{dep:'08:30',label:'Morning'},{dep:'11:00',label:'Late Morning'},{dep:'14:00',label:'Afternoon'},{dep:'18:30',label:'Evening'},{dep:'23:00',label:'Night'}].map(s=>{
    const [h,m]=s.dep.split(':').map(Number); const tzAdjust=((tzd%24)+24)%24; const ah=(h+fh+tzAdjust)%24;
    const arr=`${String(ah).padStart(2,'0')}:${String(m).padStart(2,'0')}`; const nextDay=(h+fh+tzAdjust)>=24; return {...s,arr,nextDay,fh};
  });
  return `<div class="card"><h2>🕐 Step 8: Choose Your Flight Time</h2>
    <div class="instruction">Say: “My flight departs at ______.”</div>
    <div style="margin-bottom:1rem">
      <div class="info-row"><span>Flying from</span><strong>${state.airportCode} (${state.airportCity})</strong></div>
      <div class="info-row"><span>Flying to</span><strong>${c.flag} ${c.name}</strong></div>
      <div class="info-row"><span>Flight duration</span><strong>~${fh} hours</strong></div>
      <div class="info-row"><span>Time difference</span><strong>${tzd>=0?'+':''}${tzd} hours</strong></div>
    </div>
    <div style="margin-bottom:.75rem;font-size:.82rem;font-weight:900;color:#59718a">CHOOSE DESTINATION AIRPORT</div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">${c.airports.map(d=>`<div class="option-btn ${state.destAirport===d?'selected':''}" onclick="selDest('${d.replace(/'/g,'')}')" style="flex:1;min-width:150px;padding:.7rem;font-size:.8rem">${d}</div>`).join('')}</div>
    <div class="grid-2">${slots.map(s=>`<div class="time-card ${state.depTime===s.dep?'selected':''}" onclick="selTime('${s.dep}','${s.arr}',${s.nextDay})">
      <div style="font-size:.72rem;color:#59718a;margin-bottom:4px;font-weight:900">${s.label}</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div><div class="time">${s.dep}</div><div class="detail">Departs</div></div><div style="color:#9aa;font-size:.9rem">→</div>
        <div style="text-align:right"><div class="time">${s.arr}</div><div class="detail">Arrives${s.nextDay?' (+1 day)':''}</div></div>
      </div></div>`).join('')}</div>
    <button class="btn-primary" onclick="go(8)" ${!state.depTime?'disabled':''}>Next: Choose Seat →</button></div>`;
}

function renderSeat(){
  let html=`<div class="card"><h2>💺 Step 9: Choose Your Seat</h2><div class="instruction">Tap an available seat. Yellow = Business, White = Economy.</div><div class="plane-diagram"><div style="width:60px;height:35px;background:#bad8f5;border-radius:50% 50% 0 0;margin:0 auto"></div><div class="plane-body"><div class="seat-section-label">✨ Business Class</div>`;
  const seatHtml=(sid,cls)=>{
    const tk=takenSeats.includes(sid);
    const sel=state.seat===sid;
    const classes=['seat'];
    if(cls==='business') classes.push('business');
    if(tk) classes.push('taken');
    if(sel) classes.push('selected');
    const click=tk?'':`onclick="selSeat('${sid}','${cls}')"`;
    return `<div class="${classes.join(' ')}" ${click}>${tk?'✗':sid}</div>`;
  };
  for(let r=1;r<=4;r++){
    html+=`<div class="seat-row"><span class="row-num">${r}</span>`;
    for(let c of ['A','B','C']) html+=seatHtml(r+c,'business');
    html+=`<div class="aisle"></div>`;
    for(let c of ['D','E','F']) html+=seatHtml(r+c,'business');
    html+=`</div>`;
  }
  html+=`<div style="border-top:2px dashed #7aa7d0;margin:.7rem 0"></div><div class="seat-section-label">Economy Class</div>`;
  for(let r=5;r<=28;r++){
    html+=`<div class="seat-row"><span class="row-num">${r}</span>`;
    for(let c of ['A','B','C']) html+=seatHtml(r+c,'economy');
    html+=`<div class="aisle"></div>`;
    for(let c of ['D','E','F']) html+=seatHtml(r+c,'economy');
    html+=`</div>`;
  }
  html+=`</div></div>${state.seat?`<div class="instruction" style="margin-top:1rem">✅ Seat <strong>${state.seat}</strong> selected — ${state.seatClass==='business'?'Business Class':'Economy Class'}</div>`:''}<button class="btn-primary" onclick="go(9)" ${!state.seat?'disabled':''}>Next: Choose Meal →</button></div>`;
  return html;
}
function selSeat(id,cls){state.seat=id;state.seatClass=cls;playTone(760,.08);render();}

  <div class="selfie-area"><video id="selfie-video" autoplay playsinline style="${state.selfieData?'display:none':''}"></video><canvas id="selfie-canvas" style="display:none"></canvas>${state.selfieData?`<img src="${state.selfieData}" class="selfie-preview" alt="Your selfie">`:``}

function setupCamera(){setTimeout(()=>{const v=document.getElementById('selfie-video');if(!v||state.selfieData) return;navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(s=>{stream=s;v.srcObject=s;}).catch(()=>{if(v) v.style.display='none';});},300);}
function takePhoto(){const v=document.getElementById('selfie-video'), c=document.getElementById('selfie-canvas'); if(!v||!v.videoWidth){state.selfieData='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><rect width="140" height="140" fill="%23e6f1fb"/><text x="70" y="80" text-anchor="middle" font-size="52">😊</text></svg>'; if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;} render();return;} c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);state.selfieData=c.toDataURL('image/jpeg',0.82);if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}playTone(900,.1);render();}
function retake(){state.selfieData=null;render();setupCamera();}

function makeBarcodeLines(){let s='';[1,2,1,3,1,2,2,1,3,1,2,1,1,3,2,1,1,2,3,1,2,1,2,1,3,2,1,1,2,1,3,1,2,2,1].forEach((w,i)=>{s+=`<div class="barcode-line" style="width:${w*2}px;opacity:${i%2===0?1:.3}"></div>`});return s;}


function triggerPngDownload(canvas, filename){
  try{
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }catch(e){
    alert('Download did not work in this browser. Please take a screenshot instead.');
  }
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawWrappedText(ctx,text,x,y,maxWidth,lineHeight){
  const words = String(text).split(' ');
  let line = '';
  for(let n=0;n<words.length;n++){
    const testLine = line + words[n] + ' ';
    if(ctx.measureText(testLine).width > maxWidth && n>0){
      ctx.fillText(line,x,y);
      line = words[n] + ' ';
      y += lineHeight;
    }else{
      line = testLine;
    }
  }
  ctx.fillText(line,x,y);
  return y;
}
function drawBarcode(ctx,x,y){
  const widths=[1,2,1,3,1,2,2,1,3,1,2,1,1,3,2,1,1,2,3,1,2,1,2,1,3,2,1,1,2,1,3,1,2,2,1];
  let cx=x;
  ctx.fillStyle='#073879';
  widths.forEach((w,i)=>{
    ctx.globalAlpha = i%2===0 ? 1 : .35;
    ctx.fillRect(cx,y,w*4,58);
    cx += w*4 + 3;
  });
  ctx.globalAlpha=1;
}
function loadImageForCanvas(src){
  return new Promise((resolve)=>{
    if(!src){ resolve(null); return; }
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = src;
  });
}
