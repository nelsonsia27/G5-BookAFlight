
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.app{max-width:700px;margin:0 auto;padding:1rem}
.header{background:linear-gradient(135deg,#003087,#0057b8);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;color:#fff;display:flex;align-items:center;gap:1rem}
.header-icon{font-size:2.5rem}
.header h1{font-size:1.4rem;font-weight:600;margin-bottom:.25rem}
.header p{font-size:.85rem;opacity:.85}
.steps{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--color-text-secondary);transition:all .3s}
.step-dot.active{background:#003087;border-color:#003087;color:#fff}
.step-dot.done{background:#0a7c42;border-color:#0a7c42;color:#fff}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.card h2{font-size:1.1rem;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.option-btn{border:1.5px solid var(--color-border-tertiary);border-radius:12px;padding:.75rem;cursor:pointer;background:var(--color-background-primary);text-align:center;transition:all .2s;color:var(--color-text-primary)}
.option-btn:hover{border-color:#0057b8;background:#e6f1fb}
.option-btn.selected{border-color:#0057b8;background:#e6f1fb;border-width:2px}
.option-btn img{width:100%;height:70px;object-fit:cover;border-radius:8px;margin-bottom:.5rem}
.option-btn .label{font-size:.8rem;font-weight:500}
.option-btn .sub{font-size:.7rem;color:var(--color-text-secondary);margin-top:2px}
.airline-logo{width:48px;height:48px;border-radius:8px;margin:0 auto .5rem;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;letter-spacing:.5px}
.btn-primary{background:#003087;color:#fff;border:none;border-radius:10px;padding:.75rem 2rem;font-size:.95rem;font-weight:500;cursor:pointer;width:100%;margin-top:1rem;transition:background .2s}
.btn-primary:hover{background:#0057b8}
.btn-primary:disabled{background:#888;cursor:not-allowed}
.time-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.time-card{border:1.5px solid var(--color-border-tertiary);border-radius:12px;padding:.75rem 1rem;cursor:pointer;background:var(--color-background-primary);transition:all .2s;flex:1;min-width:140px}
.time-card:hover{border-color:#0057b8;background:#e6f1fb}
.time-card.selected{border-color:#0057b8;background:#e6f1fb;border-width:2px}
.time-card .time{font-size:1.2rem;font-weight:600;color:#003087}
.time-card .detail{font-size:.72rem;color:var(--color-text-secondary);margin-top:2px}
.plane-diagram{background:var(--color-background-secondary);border-radius:12px;padding:1rem;overflow-x:auto}
.plane-nose{width:60px;height:30px;background:#b3c6e0;border-radius:50% 50% 0 0;margin:0 auto 0}
.plane-body{background:#d6e4f5;border-radius:8px;padding:.75rem}
.seat-section-label{font-size:.7rem;font-weight:600;color:#003087;text-align:center;padding:.3rem;background:#b3c6e0;border-radius:6px;margin-bottom:.5rem}
.seat-row{display:flex;gap:4px;justify-content:center;margin-bottom:4px;align-items:center}
.seat{width:26px;height:26px;border-radius:4px;border:1.5px solid #7aa7d0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#003087;font-weight:600;transition:all .15s;flex-shrink:0}
.seat:hover{background:#b3c6e0}
.seat.selected{background:#003087;color:#fff;border-color:#003087}
.seat.taken{background:#e0e0e0;cursor:not-allowed;color:#aaa;border-color:#ccc}
.seat.business{background:#ffeaa0;border-color:#c9a800}
.seat.business:hover{background:#ffd700}
.seat.business.selected{background:#c9a800;color:#fff;border-color:#a07800}
.aisle{width:18px;flex-shrink:0}
.row-num{width:18px;font-size:.6rem;color:var(--color-text-secondary);text-align:right;flex-shrink:0}
.seat-legend{display:flex;gap:1rem;margin-top:.75rem;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--color-text-secondary)}
.legend-dot{width:14px;height:14px;border-radius:3px;border:1.5px solid}
.food-card{border:1.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;background:var(--color-background-primary)}
.food-card:hover{border-color:#0057b8}
.food-card.selected{border-color:#0057b8;border-width:2px}
.food-card img{width:100%;height:90px;object-fit:cover}
.food-card .food-info{padding:.5rem}
.food-card .food-name{font-size:.8rem;font-weight:500}
.food-card .food-sub{font-size:.68rem;color:var(--color-text-secondary)}
.selfie-area{border:2px dashed var(--color-border-tertiary);border-radius:12px;padding:1.5rem;text-align:center}
#selfie-video{width:100%;max-width:320px;border-radius:10px;background:#000}
#selfie-canvas{display:none}
.selfie-preview{width:100%;max-width:320px;border-radius:10px;margin:0 auto;display:block}
.ticket{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,80,.15);max-width:460px;margin:0 auto}
.ticket-header{background:linear-gradient(135deg,#003087,#0057b8);padding:1.25rem;color:#fff;display:flex;justify-content:space-between;align-items:center}
.ticket-header .airline-name{font-size:1.1rem;font-weight:700}
.ticket-header .ticket-type{font-size:.75rem;opacity:.8;margin-top:2px}
.ticket-body{padding:1.25rem;border-bottom:1px dashed #ccc}
.route-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.route-city{text-align:center}
.route-city .code{font-size:1.8rem;font-weight:700;color:#003087}
.route-city .name{font-size:.7rem;color:#666}
.route-line{flex:1;border-top:1.5px dashed #b3c6e0;margin:0 .75rem;position:relative}
.plane-icon{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:1.1rem}
.ticket-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;font-size:.75rem}
.ticket-field .label{color:#999;font-size:.65rem;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.ticket-field .value{font-weight:600;color:#003087}
.ticket-photo-row{padding:1rem 1.25rem;display:flex;gap:1rem;align-items:center;background:#f8f9ff}
.ticket-photo{width:64px;height:64px;border-radius:8px;object-fit:cover;border:2px solid #003087}
.ticket-passenger{font-size:.8rem}
.ticket-passenger .name{font-weight:600;font-size:.95rem;color:#003087}
.ticket-passenger .seat-class{font-size:.7rem;color:#666;margin-top:2px}
.barcode{padding:.75rem 1.25rem;text-align:center}
.barcode-lines{display:flex;gap:1.5px;justify-content:center;height:36px}
.barcode-line{background:#003087}
.confetti-wrap{text-align:center;padding:1rem 0 .5rem}
.badge{display:inline-block;background:#e6f1fb;color:#003087;border-radius:20px;padding:.2rem .75rem;font-size:.72rem;font-weight:500;margin:2px}
.country-flag{font-size:1.4rem}
.info-row{display:flex;justify-content:space-between;font-size:.8rem;color:var(--color-text-secondary);padding:.4rem 0;border-bottom:.5px solid var(--color-border-tertiary)}
.info-row:last-child{border-bottom:none}
.info-row strong{color:var(--color-text-primary)}
.progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#003087;transition:width .5s}
</style>

<h2 class="sr-only">Book a Flight — a fun flight booking game for 5th graders</h2>
<div class="app">
  <div class="header">
    <div class="header-icon">✈️</div>
    <div>
      <h1>Book a Flight!</h1>
      <p>Plan your dream trip from Taiwan to the world 🌍</p>
    </div>
  </div>
  <div class="steps" id="steps-bar"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:12%"></div></div>
  <div id="step-content"></div>
</div>

<script>
const STEPS = ['Airline','Airport','Destination','Schedule','Seat','Meal','Selfie','Ticket'];
const COUNTRIES = {
  USA:{name:'United States',flag:'🇺🇸',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/40.jpg?raw=true',airports:['LAX – Los Angeles','JFK – New York','SFO – San Francisco'],tz_diff:17,flight_h:{TPE:13,KHH:14},code:'LAX'},
  NZ:{name:'New Zealand',flag:'🇳🇿',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/20.jpg?raw=true',airports:['AKL – Auckland','CHC – Christchurch'],tz_diff:4,flight_h:{TPE:11,KHH:11},code:'AKL'},
  TH:{name:'Thailand',flag:'🇹🇭',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/24.jpg?raw=true',airports:['BKK – Bangkok Suvarnabhumi','HKT – Phuket'],tz_diff:-1,flight_h:{TPE:3,KHH:3},code:'BKK'},
  PH:{name:'Philippines',flag:'🇵🇭',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/27.jpg?raw=true',airports:['MNL – Manila Ninoy Aquino','CEB – Mactan Cebu'],tz_diff:0,flight_h:{TPE:2,KHH:2},code:'MNL'},
  SG:{name:'Singapore',flag:'🇸🇬',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/30.jpg?raw=true',airports:['SIN – Changi Airport'],tz_diff:0,flight_h:{TPE:4,KHH:4},code:'SIN'},
  JP:{name:'Japan',flag:'🇯🇵',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/38.jpg?raw=true',airports:['NRT – Tokyo Narita','KIX – Osaka Kansai','CTS – Sapporo'],tz_diff:1,flight_h:{TPE:3,KHH:3},code:'NRT'},
  BR:{name:'Brazil',flag:'🇧🇷',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/36.jpg?raw=true',airports:['GRU – São Paulo Guarulhos','GIG – Rio de Janeiro'],tz_diff:-12,flight_h:{TPE:23,KHH:24},code:'GRU'},
  CN:{name:'China',flag:'🇨🇳',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/34.jpg?raw=true',airports:['PEK – Beijing Capital','PVG – Shanghai Pudong','CAN – Guangzhou'],tz_diff:0,flight_h:{TPE:3,KHH:3},code:'PEK'}
};
const AIRLINES = [
  {id:'CI',name:'China Airlines',color:'#c00',bg:'#fff0f0',text:'CI'},
  {id:'BR',name:'EVA Air',color:'#006b3f',bg:'#e6f5ee',text:'BR'},
  {id:'JL',name:'Japan Airlines',color:'#e60012',bg:'#fff0f0',text:'JL'},
  {id:'SQ',name:'Singapore Airlines',color:'#00358e',bg:'#e6f0ff',text:'SQ'},
  {id:'CX',name:'Cathay Pacific',color:'#006d5b',bg:'#e6f5f2',text:'CX'},
  {id:'TG',name:'Thai Airways',color:'#640b6b',bg:'#f5e6f7',text:'TG'}
];
const MEALS = [
  {id:'m1',name:'Chicken Rice',sub:'Classic Asian set meal',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/in-flight-meal-in-chicken.jpg?raw=true'},
  {id:'m2',name:'Western Beef',sub:'Steak with vegetables',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/The-Best-Foods-to-Order-on-a-Flight-According-to-Chefs-FT-BLOG1222-4c93bdb4cdaa4c469a75753f3b5ae00c.jpg?raw=true'},
  {id:'m3',name:'Noodle Soup',sub:'Warm comfort bowl',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/5f3a16eaa3108348fce56832.jpeg?raw=true'},
  {id:'m4',name:'Vegetarian Plate',sub:'Fresh garden selection',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/3093737e95b4a0c45be12b0b261e4e09.jpg?raw=true'},
  {id:'m5',name:'Special Set',sub:'Chef\'s recommendation',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/maxresdefault%20(1).jpg?raw=true'},
  {id:'m6',name:'Business Dinner',sub:'Premium 3-course meal',img:'https://github.com/nelsonsia27/G5-BookAFlight/blob/main/17.-Aer-Lingus-Economy-Class-Dinner-Dublin-to-Chicago-October-2022.jpg?raw=true'}
];

let state = {step:0, airline:null, airportCode:null, airportCity:null, country:null, destAirport:null, depTime:null, arrTime:null, seat:null, seatClass:null, meal:null, selfieData:null, name:'Traveler'};
let takenSeats = [];
let stream = null;

function initTaken(){
  takenSeats=[];
  for(let r=1;r<=28;r++) for(let c of ['A','B','C','D','E','F']){
    if(Math.random()<.35) takenSeats.push(r+c);
  }
}
initTaken();

function renderSteps(){
  const bar=document.getElementById('steps-bar');
  bar.innerHTML=STEPS.map((s,i)=>`<div class="step-dot ${i<state.step?'done':i===state.step?'active':''}">${i<state.step?'✓':(i+1)}</div>`).join('');
  document.getElementById('progress-fill').style.width=((state.step+1)/STEPS.length*100)+'%';
}

function go(n){state.step=n;renderSteps();render();}

function render(){
  const el=document.getElementById('step-content');
  switch(state.step){
    case 0: el.innerHTML=renderAirline(); break;
    case 1: el.innerHTML=renderAirport(); break;
    case 2: el.innerHTML=renderCountry(); break;
    case 3: el.innerHTML=renderSchedule(); break;
    case 4: el.innerHTML=renderSeat(); break;
    case 5: el.innerHTML=renderMeal(); break;
    case 6: el.innerHTML=renderSelfie(); setupCamera(); break;
    case 7: el.innerHTML=renderTicket(); break;
  }
}

function renderAirline(){
  return `<div class="card"><h2>🛫 Step 1: Choose Your Airline</h2>
  <div class="grid-3">${AIRLINES.map(a=>`<div class="option-btn ${state.airline===a.id?'selected':''}" onclick="selectAirline('${a.id}')">
    <div class="airline-logo" style="background:${a.bg};color:${a.color};font-size:.85rem;font-weight:800">${a.text}</div>
    <div class="label">${a.name}</div>
  </div>`).join('')}</div>
  <button class="btn-primary" onclick="go(1)" ${!state.airline?'disabled':''}>Next: Choose Airport →</button></div>`;
}

function selectAirline(id){state.airline=id;render();}

function renderAirport(){
  const opts=[{code:'TPE',city:'Taoyuan',name:'Taiwan Taoyuan International Airport',emoji:'🛬'},{code:'KHH',city:'Kaohsiung',name:'Kaohsiung International Airport',emoji:'🏙️'}];
  return `<div class="card"><h2>🏢 Step 2: Choose Departure Airport</h2>
  <div class="grid-2">${opts.map(a=>`<div class="option-btn ${state.airportCode===a.code?'selected':''}" onclick="selectAirport('${a.code}','${a.city}')" style="padding:1.25rem">
    <div style="font-size:2rem;margin-bottom:.5rem">${a.emoji}</div>
    <div class="label" style="font-size:.9rem">${a.code}</div>
    <div class="sub">${a.name}</div>
  </div>`).join('')}</div>
  <button class="btn-primary" onclick="go(2)" ${!state.airportCode?'disabled':''}>Next: Choose Destination →</button></div>`;
}

function selectAirport(code,city){state.airportCode=code;state.airportCity=city;state.depTime=null;state.arrTime=null;render();}

function renderCountry(){
  return `<div class="card"><h2>🌍 Step 3: Where Do You Want to Go?</h2>
  <div class="grid-4">${Object.entries(COUNTRIES).map(([k,c])=>`<div class="option-btn ${state.country===k?'selected':''}" onclick="selectCountry('${k}')">
    <img src="${c.img}" alt="${c.name}" onerror="this.style.display='none'">
    <div style="font-size:1.3rem;margin:.25rem 0">${c.flag}</div>
    <div class="label">${c.name}</div>
  </div>`).join('')}</div>
  <button class="btn-primary" onclick="go(3)" ${!state.country?'disabled':''}>Next: Choose Time →</button></div>`;
}

function selectCountry(k){state.country=k;state.depTime=null;state.arrTime=null;const c=COUNTRIES[k];state.destAirport=c.airports[0];render();}

function renderSchedule(){
  if(!state.country) return '';
  const c=COUNTRIES[state.country];
  const fh=c.flight_h[state.airportCode]||5;
  const tzd=c.tz_diff;
  const slots=[
    {dep:'06:00',label:'Early Morning'},
    {dep:'08:30',label:'Morning'},
    {dep:'11:00',label:'Late Morning'},
    {dep:'14:00',label:'Afternoon'},
    {dep:'18:30',label:'Evening'},
    {dep:'23:00',label:'Night (Red-eye)'}
  ].map(s=>{
    const [h,m]=s.dep.split(':').map(Number);
    let ah=h+fh;
    let am=m;
    const tzAdjust=((tzd%24)+24)%24;
    ah=((ah+tzAdjust)%24);
    const arr=`${String(ah).padStart(2,'0')}:${String(am).padStart(2,'0')}`;
    const nextDay=(h+fh+tzAdjust)>=24;
    return {...s,arr,nextDay,fh};
  });
  const destOpts=c.airports;
  return `<div class="card">
    <h2>🕐 Step 4: Choose Your Flight Time</h2>
    <div style="margin-bottom:1rem">
      <div class="info-row"><span>Flying from</span><strong>${state.airportCode} (${state.airportCity})</strong></div>
      <div class="info-row"><span>Flying to</span><strong>${c.flag} ${c.name}</strong></div>
      <div class="info-row"><span>Flight duration</span><strong>~${fh} hours</strong></div>
      <div class="info-row"><span>Time difference</span><strong>${tzd>=0?'+':''} ${tzd} hours</strong></div>
    </div>
    <div style="margin-bottom:.75rem;font-size:.8rem;font-weight:500;color:var(--color-text-secondary)">CHOOSE DESTINATION AIRPORT</div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
      ${destOpts.map(d=>`<div class="option-btn ${state.destAirport===d?'selected':''}" onclick="selDest('${d.replace(/'/g,'')}')" style="flex:1;min-width:130px;padding:.6rem;font-size:.75rem">${d}</div>`).join('')}
    </div>
    <div style="margin-bottom:.75rem;font-size:.8rem;font-weight:500;color:var(--color-text-secondary)">CHOOSE DEPARTURE TIME (Taiwan time)</div>
    <div class="grid-2">${slots.map((s,i)=>`<div class="time-card ${state.depTime===s.dep?'selected':''}" onclick="selTime('${s.dep}','${s.arr}',${s.nextDay})">
      <div style="font-size:.7rem;color:var(--color-text-secondary);margin-bottom:4px">${s.label}</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div><div class="time">${s.dep}</div><div class="detail">Departs ${state.airportCode}</div></div>
        <div style="color:#999;font-size:.8rem">→</div>
        <div style="text-align:right"><div class="time">${s.arr}</div><div class="detail">Arrives${s.nextDay?' (+1 day)':''}</div></div>
      </div>
    </div>`).join('')}</div>
    <button class="btn-primary" onclick="go(4)" ${!state.depTime?'disabled':''}>Next: Choose Seat →</button>
  </div>`;
}

function selDest(d){state.destAirport=d;render();}
function selTime(dep,arr,nd){state.depTime=dep;state.arrTime=arr+(nd?' +1':'');render();}

function renderSeat(){
  const bRows=4; const eRows=24;
  let html=`<div class="card"><h2>💺 Step 5: Choose Your Seat</h2>
  <div style="margin-bottom:.75rem;font-size:.85rem;color:var(--color-text-secondary)">Tap an available seat. Yellow = Business, White = Economy.</div>
  <div class="plane-diagram">
    <div style="width:50px;height:25px;background:#b3c6e0;border-radius:50% 50% 0 0;margin:0 auto 0"></div>
    <div style="width:50px;height:15px;background:#b3c6e0;margin:0 auto"></div>
    <div class="plane-body">
      <div class="seat-section-label">✨ Business Class (Rows 1–4)</div>`;
  for(let r=1;r<=bRows;r++){
    html+=`<div class="seat-row"><span class="row-num">${r}</span>`;
    for(let c of ['A','B','C']){
      const sid=r+c, tk=takenSeats.includes(sid), sel=state.seat===sid;
      html+=`<div class="seat business ${tk?'taken':''} ${sel?'selected':''}" onclick="${tk?'':'selSeat(\''+sid+'\',\'business\')'}">${tk?'✗':sid}</div>`;
    }
    html+=`<div class="aisle"></div>`;
    for(let c of ['D','E','F']){
      const sid=r+c, tk=takenSeats.includes(sid), sel=state.seat===sid;
      html+=`<div class="seat business ${tk?'taken':''} ${sel?'selected':''}" onclick="${tk?'':'selSeat(\''+sid+'\',\'business\')'}">${tk?'✗':sid}</div>`;
    }
    html+=`</div>`;
  }
  html+=`<div style="border-top:2px dashed #7aa7d0;margin:.5rem 0"></div>
    <div class="seat-section-label">Economy Class (Rows 5–28)</div>`;
  for(let r=5;r<=28;r++){
    html+=`<div class="seat-row"><span class="row-num">${r}</span>`;
    for(let c of ['A','B','C']){
      const sid=r+c, tk=takenSeats.includes(sid), sel=state.seat===sid;
      html+=`<div class="seat ${tk?'taken':''} ${sel?'selected':''}" onclick="${tk?'':'selSeat(\''+sid+'\',\'economy\')'}">${tk?'✗':sid}</div>`;
    }
    html+=`<div class="aisle"></div>`;
    for(let c of ['D','E','F']){
      const sid=r+c, tk=takenSeats.includes(sid), sel=state.seat===sid;
      html+=`<div class="seat ${tk?'taken':''} ${sel?'selected':''}" onclick="${tk?'':'selSeat(\''+sid+'\',\'economy\')'}">${tk?'✗':sid}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>
    <div class="seat-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ffeaa0;border-color:#c9a800"></div> Business</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fff;border-color:#7aa7d0"></div> Economy</div>
      <div class="legend-item"><div class="legend-dot" style="background:#003087;border-color:#003087"></div> Your seat</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e0e0e0;border-color:#ccc"></div> Taken</div>
    </div>`;
  if(state.seat) html+=`<div style="margin-top:.75rem;padding:.75rem;background:#e6f1fb;border-radius:10px;font-size:.85rem;text-align:center">✅ Seat <strong>${state.seat}</strong> selected — ${state.seatClass==='business'?'✨ Business Class':'Economy Class'}</div>`;
  html+=`<button class="btn-primary" onclick="go(5)" ${!state.seat?'disabled':''}>Next: Choose Meal →</button></div>`;
  return html;
}

function selSeat(id,cls){state.seat=id;state.seatClass=cls;render();}

function renderMeal(){
  return `<div class="card"><h2>🍽️ Step 6: Choose Your In-Flight Meal</h2>
  <div class="grid-3">${MEALS.map(m=>`<div class="food-card ${state.meal===m.id?'selected':''}" onclick="selMeal('${m.id}')">
    <img src="${m.img}" alt="${m.name}" onerror="this.style.background:'#f0f4ff'">
    <div class="food-info"><div class="food-name">${m.name}</div><div class="food-sub">${m.sub}</div></div>
  </div>`).join('')}</div>
  <button class="btn-primary" onclick="go(6)" ${!state.meal?'disabled':''}>Next: Take Your Selfie 📸 →</button></div>`;
}

function selMeal(id){state.meal=id;render();}

function renderSelfie(){
  return `<div class="card"><h2>📸 Step 7: Take Your Passport Selfie!</h2>
  <div style="margin-bottom:1rem;font-size:.85rem;color:var(--color-text-secondary)">Look at the camera and smile! Your photo will appear on your boarding pass. ✈️</div>
  <div class="selfie-area">
    <video id="selfie-video" autoplay playsinline style="width:100%;max-width:320px;border-radius:10px;margin:0 auto;display:block"></video>
    <canvas id="selfie-canvas" style="display:none"></canvas>
    ${state.selfieData?`<img src="${state.selfieData}" class="selfie-preview" alt="Your selfie">`:``}
    <div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
      <button onclick="takePhoto()" style="background:#003087;color:#fff;border:none;border-radius:10px;padding:.6rem 1.5rem;cursor:pointer;font-size:.9rem">📷 Take Photo</button>
      ${state.selfieData?`<button onclick="retake()" style="background:transparent;border:1.5px solid var(--color-border-tertiary);border-radius:10px;padding:.6rem 1.5rem;cursor:pointer;font-size:.9rem">🔄 Retake</button>`:''}
    </div>
    <p style="font-size:.72rem;color:var(--color-text-secondary);margin-top:.75rem">Camera stays private — your photo only shows on your ticket!</p>
  </div>
  <div style="margin-top:1rem">
    <label style="font-size:.85rem;font-weight:500;display:block;margin-bottom:.5rem">Your Name (for the ticket)</label>
    <input type="text" id="pax-name" value="${state.name}" oninput="state.name=this.value" placeholder="Type your name" style="width:100%;padding:.6rem .75rem;border:1.5px solid var(--color-border-tertiary);border-radius:8px;font-size:.9rem;background:var(--color-background-primary);color:var(--color-text-primary)">
  </div>
  <button class="btn-primary" onclick="go(7)" ${!state.selfieData?'disabled':''}>🎉 Generate My Boarding Pass! →</button></div>`;
}

function setupCamera(){
  setTimeout(()=>{
    const v=document.getElementById('selfie-video');
    if(!v||state.selfieData) return;
    navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(s=>{stream=s;v.srcObject=s;}).catch(()=>{
      if(v) v.style.display='none';
    });
  },300);
}

function takePhoto(){
  const v=document.getElementById('selfie-video');
  const c=document.getElementById('selfie-canvas');
  if(!v||!v.videoWidth) {
    state.selfieData='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" fill="%23e6f1fb"/><text x="60" y="65" text-anchor="middle" font-size="40">😊</text></svg>';
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    render();return;
  }
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  state.selfieData=c.toDataURL('image/jpeg',0.8);
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  render();
}

function retake(){
  state.selfieData=null;
  render();
  setupCamera();
}

function makeBarcodeLines(){
  let s='';
  const widths=[1,2,1,3,1,2,2,1,3,1,2,1,1,3,2,1,1,2,3,1,2,1,2,1,3,2,1,1,2,1,3,1,2,2,1];
  widths.forEach((w,i)=>{s+=`<div class="barcode-line" style="width:${w*2}px;opacity:${i%2===0?1:.3}"></div>`;});
  return s;
}

function renderTicket(){
  const a=AIRLINES.find(x=>x.id===state.airline)||AIRLINES[0];
  const c=COUNTRIES[state.country];
  const meal=MEALS.find(m=>m.id===state.meal);
  const flightNum=a.id+(Math.floor(Math.random()*900)+100);
  const bookRef=Math.random().toString(36).substr(2,6).toUpperCase();
  return `<div class="confetti-wrap">
    <div style="font-size:2rem">🎉</div>
    <div style="font-size:1.1rem;font-weight:600;color:var(--color-text-primary);margin:.5rem 0">Your Boarding Pass is Ready!</div>
    <div style="font-size:.8rem;color:var(--color-text-secondary)">Have a wonderful flight! ✈️</div>
  </div>
  <div class="ticket">
    <div class="ticket-header">
      <div>
        <div style="font-size:.7rem;opacity:.75;letter-spacing:1px;margin-bottom:2px">BOARDING PASS</div>
        <div class="airline-name">${a.name}</div>
        <div class="ticket-type">Flight ${flightNum}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:1.5rem">${c.flag}</div>
        <div style="font-size:.7rem;opacity:.8;margin-top:4px">${bookRef}</div>
      </div>
    </div>
    <div class="ticket-body">
      <div class="route-row">
        <div class="route-city">
          <div class="code">${state.airportCode}</div>
          <div class="name">${state.airportCity}, Taiwan</div>
        </div>
        <div class="route-line"><div class="plane-icon">✈️</div></div>
        <div class="route-city">
          <div class="code">${c.code}</div>
          <div class="name">${c.name}</div>
        </div>
      </div>
      <div class="ticket-grid">
        <div class="ticket-field"><div class="label">Date</div><div class="value">${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</div></div>
        <div class="ticket-field"><div class="label">Departs</div><div class="value">${state.depTime}</div></div>
        <div class="ticket-field"><div class="label">Arrives</div><div class="value">${state.arrTime}</div></div>
        <div class="ticket-field"><div class="label">Seat</div><div class="value">${state.seat}</div></div>
        <div class="ticket-field"><div class="label">Class</div><div class="value">${state.seatClass==='business'?'Business':'Economy'}</div></div>
        <div class="ticket-field"><div class="label">Meal</div><div class="value">${meal?meal.name:'—'}</div></div>
      </div>
    </div>
    <div class="ticket-photo-row">
      ${state.selfieData?`<img src="${state.selfieData}" class="ticket-photo" alt="Passenger photo">`:'<div style="width:64px;height:64px;border-radius:8px;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:1.8rem">😊</div>'}
      <div class="ticket-passenger">
        <div class="name">${state.name||'Traveler'}</div>
        <div class="seat-class">${state.seatClass==='business'?'✨ Business Class':'Economy Class'} · ${a.name}</div>
        <div style="margin-top:4px;font-size:.7rem;color:#666">Destination: ${c.name} ${c.flag}</div>
        <div style="font-size:.7rem;color:#888;margin-top:2px">Booking Ref: <strong>${bookRef}</strong></div>
      </div>
    </div>
    <div class="barcode"><div class="barcode-lines">${makeBarcodeLines()}</div>
    <div style="font-size:.65rem;color:#999;margin-top:4px;letter-spacing:2px">${flightNum} • ${state.airportCode}→${c.code} • ${bookRef}</div></div>
  </div>
  <div style="margin-top:1.25rem;padding:.75rem;background:var(--color-background-secondary);border-radius:12px;font-size:.82rem;color:var(--color-text-secondary);text-align:center">
    🌟 You booked a flight from <strong>${state.airportCity}</strong> to <strong>${c.name}</strong> on <strong>${a.name}</strong>!<br>
    Seat <strong>${state.seat}</strong> · ${state.depTime} departure · Enjoy your <strong>${meal?meal.name:'meal'}</strong> on board!
  </div>
  <button class="btn-primary" onclick="restart()" style="margin-top:1rem;background:#0a7c42">🔄 Book Another Flight!</button>`;
}

function restart(){
  state={step:0,airline:null,airportCode:null,airportCity:null,country:null,destAirport:null,depTime:null,arrTime:null,seat:null,seatClass:null,meal:null,selfieData:null,name:'Traveler'};
  initTaken();
  renderSteps();render();
}

renderSteps();
render();
</script>
